<script>
const IMAGES = [
  "cowimages/CowsSketches_Cow-10.jpg",
  "cowimages/CowsSketches_Cow-12.jpg",
  "cowimages/CowsSketches_Cow-20.jpg",
  "cowimages/CowsSketches_Cow-25.jpg"
];
const REEL_DELAY = [0, 220, 440];
const REEL_DURATION = [1400, 1700, 2000];
const REEL_FINISH = REEL_DELAY.map((d,i)=>d+REEL_DURATION[i]);
const LAST_FINISH = Math.max(...REEL_FINISH);
const BELL_RING_MS = LAST_FINISH - 1600;
const REPEATS = 4;
const CELL = 280;
const CANVAS_W = 984;
const CANVAS_H = 579;

document.documentElement.style.setProperty('--ring-ms', BELL_RING_MS + 'ms');

const MATCH_LINES = ["holy cow, you did it", "udderly perfect", "you can really move 'em"];
const PAIR_LINES = ["close, but no full herd", "just one cow away...", "smh, that cow never listens"];
const MISS_LINES = ["busy grazing", "cows gone rogue", "guess they'd rather not"];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function buildTrack(i){
  const track = document.getElementById('track-'+i);
  track.innerHTML = "";
  for(let r=0;r<REPEATS;r++){
    IMAGES.forEach(src=>{
      const img = document.createElement('img');
      img.src = src;
      img.draggable = false;
      track.appendChild(img);
    });
  }
}
[0,1,2].forEach(buildTrack);

const currentIndex = [0,0,0];
function setInitial(){
  [0,1,2].forEach(i=>{
    const start = Math.floor(Math.random()*IMAGES.length);
    document.getElementById('track-'+i).style.transform = `translateY(${-start*CELL}px)`;
    currentIndex[i] = start;
  });
}
setInitial();

// scale the fixed 984x579 stage to fit the outer wrapper's actual width
const outer = document.getElementById('outer');
const stage = document.getElementById('stage');
function rescale(){
  const w = outer.getBoundingClientRect().width;
  const scale = w / CANVAS_W;
  if(window.innerWidth <= 600){
    stage.style.transform = `translate(-50%, 0) scale(${scale})`;
  } else {
    stage.style.transform = `scale(${scale})`;
  }
  outer.style.height = (CANVAS_H * scale) + 'px';
}
new ResizeObserver(rescale).observe(outer);
rescale();

function easeOutCubic(t){ return 1 - Math.pow(1-t,3); }

function spinReel(i, delayMs, durationMs){
  return new Promise(resolve=>{
    const track = document.getElementById('track-'+i);
    const cur = currentIndex[i];
    const finalIndex = Math.floor(Math.random()*IMAGES.length);
    // Land on the LAST repeat of the strip — always within the rendered strip's
    // bounds. The previous formula could target a cell past the end of the strip
    // whenever finalIndex < cur, landing on empty space (a white cell).
    const landAbs = (REPEATS - 1) * IMAGES.length + finalIndex;
    const startPos = cur*CELL;
    const endPos = landAbs*CELL;

    setTimeout(()=>{
      const start = performance.now();
      function frame(now){
        const t = Math.min((now-start)/durationMs, 1);
        const eased = easeOutCubic(t);
        const pos = startPos + (endPos-startPos)*eased;
        track.style.transform = `translateY(${-pos}px)`;
        if(t<1) requestAnimationFrame(frame);
        else {
          track.style.transform = `translateY(${-finalIndex*CELL}px)`;
          currentIndex[i] = finalIndex;
          resolve(finalIndex);
        }
      }
      requestAnimationFrame(frame);
    }, delayMs);
  });
}

const bell = document.getElementById('bell-wrapper');
const bellInner = document.getElementById('bell');
const nudgeLabel = document.getElementById('nudge-label');
const nudgeArrow = document.getElementById('nudge-arrow');
const result = document.getElementById('result');
let spinning = false;

bell.addEventListener('click', async ()=>{
  if(spinning) return;
  spinning = true;
  bellInner.classList.add('ringing');
  nudgeLabel.classList.add('paused');
  nudgeArrow.classList.add('paused');
  result.innerHTML = "";

  setTimeout(()=> bellInner.classList.remove('ringing'), BELL_RING_MS);

  const results = await Promise.all([
    spinReel(0, REEL_DELAY[0], REEL_DURATION[0]),
    spinReel(1, REEL_DELAY[1], REEL_DURATION[1]),
    spinReel(2, REEL_DELAY[2], REEL_DURATION[2]),
  ]);

  const allMatch = results[0]===results[1] && results[1]===results[2];
  const anyPair = results[0]===results[1] || results[1]===results[2] || results[0]===results[2];

  const line = allMatch ? pick(MATCH_LINES) : anyPair ? pick(PAIR_LINES) : pick(MISS_LINES);
  result.innerHTML = "";
  const frag = document.createDocumentFragment();
  let letterIndex = 0;
  for(const ch of line){
    if(ch === " "){
      frag.appendChild(document.createTextNode(" "));
    } else {
      const span = document.createElement("span");
      span.className = "result-letter";
      span.style.animationDelay = (letterIndex * 28) + "ms";
      span.textContent = ch;
      frag.appendChild(span);
      letterIndex++;
    }
  }
  result.appendChild(frag);

  spinning = false;
  nudgeLabel.classList.remove('paused');
  nudgeArrow.classList.remove('paused');
});

// ── Moo bubble animation (mobile only) ──────────────────────────────────
const MOO_POS = [[94,78],[66,73],[89,63],[89,14],[18,81],[36,75],[23,66],[26,20],[27,8],[63,4]];
function mooDist(a,b){
  const dx=MOO_POS[a][0]-MOO_POS[b][0], dy=MOO_POS[a][1]-MOO_POS[b][1];
  return Math.sqrt(dx*dx+dy*dy);
}

if(window.matchMedia('(max-width:600px)').matches){
  const bubbles = Array.from({length:10}, (_,i)=>document.getElementById('moo-'+i));
  // position bubbles
  bubbles.forEach((el,i)=>{
    el.style.left = MOO_POS[i][0]+'%';
    el.style.top  = MOO_POS[i][1]+'%';
  });

  let active = [3, 7]; // start: sky-right + sky-left (well separated)
  let slot = 0;

  // show initial pair
  active.forEach(i => bubbles[i].style.opacity='1');

  function rotateMoo(){
    const keep = active[1-slot];
    const outIdx = active[slot];
    // pick next: not either active, not too close to keep
    let pool = Array.from({length:10},(_,i)=>i)
      .filter(i=>i!==active[0]&&i!==active[1])
      .filter(i=>mooDist(i,keep)>25);
    if(!pool.length) pool = Array.from({length:10},(_,i)=>i).filter(i=>i!==active[0]&&i!==active[1]);
    if(!pool.length) pool = [outIdx];
    const newIdx = pool[Math.floor(Math.random()*pool.length)];
    // crossfade simultaneously
    bubbles[outIdx].style.opacity='0';
    bubbles[newIdx].style.opacity='1';
    active[slot] = newIdx;
    slot = 1-slot;
    setTimeout(rotateMoo, 3700);
  }
  setTimeout(rotateMoo, 3700);
}
</script>
